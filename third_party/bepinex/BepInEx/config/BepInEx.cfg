## Seed config shipped with the vendored BepInEx so a fresh deploy already has
## the entrypoint fix required by Unity 5.3.7. BepInEx fills every other setting
## with its defaults on first run; only the values below are pre-set.

[Preloader.Entrypoint]

## The default entrypoint (Application/.cctor) runs the chainloader during
## Application's static constructor, which corrupts NGUI scene deserialization
## on this old Unity build and hangs the game on the loading screen. Hooking
## MonoBehaviour instead defers it past that point. Alternate if needed: Camera.
Assembly = UnityEngine.dll
Type = MonoBehaviour
Method = .cctor
